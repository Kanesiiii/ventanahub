<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentanaHub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b1220;
  color: white;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  padding: 20px;
  text-align: center;
  background: rgba(15,27,51,0.8);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 15px;
}

.hero p {
  color: #ccc;
  margin-bottom: 25px;
}

.btn {
  padding: 15px 30px;
  background: #4ea1ff;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #2f7edb;
}

/* CATALOG */
.catalog {
  padding: 80px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px;
}

.card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.4s;
}

.card img {
  width: 100%;
  height: 350px;
  object-fit: cover;
}

.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.card-content {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 2;
}

.card:hover {
  transform: scale(1.05);
}

/* ADVANTAGES */
.advantages {
  padding: 60px 20px;
  text-align: center;
  background: #111c33;
}

.advantages h2 {
  margin-bottom: 40px;
}

.adv-grid {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.adv {
  max-width: 200px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #0f1b33;
}
</style>
</head>

<body>

<header>VentanaHub</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Окна, жалюзи и комфорт</h1>
    <p>Премиальные решения для вашего дома</p>
    <a href="#catalog" class="btn">Смотреть каталог</a>
  </div>
</section>

<!-- КАТАЛОГ -->
<section class="catalog" id="catalog">

  <a href="pvc.html" class="card">
    <img src="https://images.unsplash.com/photo-1582582494700-f8ce0b63a9c0">
    <div class="card-content">
      <h2>ПВХ окна</h2>
    </div>
  </a>

  <a href="blinds.html" class="card">
    <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36">
    <div class="card-content">
      <h2>Жалюзи</h2>
    </div>
  </a>

  <a href="nets.html" class="card">
    <img src="https://images.unsplash.com/photo-1593696140826-c58b021acf8b">
    <div class="card-content">
      <h2>Москитные сетки</h2>
    </div>
  </a>

</section>

<!-- ПРЕИМУЩЕСТВА -->
<section class="advantages">
  <h2>Почему выбирают нас</h2>

  <div class="adv-grid">
    <div class="adv">
      <h3>10+ лет</h3>
      <p>опыта работы</p>
    </div>

    <div class="adv">
      <h3>500+</h3>
      <p>установленных окон</p>
    </div>

    <div class="adv">
      <h3>Гарантия</h3>
      <p>на все изделия</p>
    </div>
  </div>
</section>

<footer>
  © 2026 VentanaHub
</footer>

</body>
</html>
