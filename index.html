<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VentanaHub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #fff;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #1f2937;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      color: #3b82f6;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #0b0f1a, #1e293b);
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 40px 20px;
    }

    .card {
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .card iframe {
      width: 100%;
      height: 200px;
      border: none;
      background: white;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #6b7280;
      border-top: 1px solid #1f2937;
    }
  </style>
</head>
<body>

<header>
  <h1>VentanaHub</h1>
</header>

<section class="hero">
  <h2>Продажа окон и решений</h2>
  <p>Каталоги, предложения и техническая информация</p>
  <a href="#catalog" class="btn">Смотреть каталог</a>
</section>

<section id="catalog" class="container">

  <div class="card">
    <iframe src="file1.pdf"></iframe>
    <div class="card-content">
      <h3>ПВХ Окна</h3>
      <a href="file1.pdf" class="btn" target="_blank">Открыть PDF</a>
    </div>
  </div>

  <div class="card">
    <iframe src="file2.pdf"></iframe>
    <div class="card-content">
      <h3>Алюминиевые системы</h3>
      <a href="file2.pdf" class="btn" target="_blank">Открыть PDF</a>
    </div>
  </div>

</section>

<footer>
  © 2026 VentanaHub — Все права защищены
</footer>

</body>
</html>
