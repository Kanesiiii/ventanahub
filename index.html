<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Продажа окон</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      background: #0f1b33;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #4ea1ff;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #0b1220, #162a4d);
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #4ea1ff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .catalog {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #111c33;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #0f1b33;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  VentanaHub
</header>

<section class="hero">
  <h1>Продажа окон и решений</h1>
  <p>ПВХ окна, персианы и москитные сетки</p>
  <button class="btn">Смотреть каталог</button>
</section>

<section class="catalog">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1582582494700-f8ce0b63a9c0" alt="ПВХ окна">
    <div class="card-content">
      <h3>ПВХ окна</h3>
      <p>Тёплые и надёжные окна для дома</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="Жалюзи">
    <div class="card-content">
      <h3>Персианы (жалюзи)</h3>
      <p>Защита от солнца и стильный интерьер</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1597003912951-dc2c3f9eae8c" alt="Москитные сетки">
    <div class="card-content">
      <h3>Москитные сетки</h3>
      <p>Защита от насекомых и пыли</p>
    </div>
  </div>

</section>

<footer>
  © 2026 VentanaHub — Все права защищены
</footer>

</body>
</html>
