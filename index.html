<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentanaHub</title>

<style>
body {margin:0;font-family:Arial;background:#0b1220;color:white}

/* HEADER */
header {
  position:fixed;width:100%;padding:15px;
  display:flex;justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.lang button {
  margin:5px;
  padding:5px 10px;
  cursor:pointer;
}

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display:flex;align-items:center;justify-content:center;
  text-align:center;position:relative;
}
.hero::after {
  content:"";position:absolute;inset:0;
  background:rgba(0,0,0,0.6);
}
.hero-content {position:relative;z-index:2}

/* BUTTON */
.btn {
  background:#4ea1ff;
  padding:12px 20px;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

/* CALCULATOR */
.calc {
  padding:40px;text-align:center;
}
select,input {
  padding:10px;margin:10px;
}

/* MAP */
.map {
  padding:40px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div>VentanaHub</div>

  <div class="lang">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('es')">ES</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1 id="title">Окна и решения</h1>
    <p id="subtitle">ПВХ, жалюзи, москитки</p>
    <br>
    <a href="https://wa.me/34614577968" class="btn">WhatsApp</a>
  </div>
</section>

<!-- КАЛЬКУЛЯТОР -->
<section class="calc">
  <h2 id="calcTitle">Рассчитать стоимость</h2>

  <select id="type">
    <option value="100">ПВХ окно</option>
    <option value="50">Жалюзи</option>
    <option value="30">Сетка</option>
  </select>

  <input type="number" id="size" placeholder="Размер (м²)">

  <br>
  <button onclick="calc()">Рассчитать</button>

  <h3 id="result"></h3>
</section>

<!-- КАРТА -->
<section class="map">
  <h2>Мы на карте</h2>

  <iframe 
    src="https://maps.google.com/maps?q=Barcelona&t=&z=13&ie=UTF8&iwloc=&output=embed"
    width="100%" height="300" style="border:0;">
  </iframe>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/34614577968" class="whatsapp">💬</a>

<script>
function calc(){
  let price = document.getElementById("type").value;
  let size = document.getElementById("size").value;

  let result = price * size;
  document.getElementById("result").innerText = "≈ " + result + " €";
}

/* LANGUAGE */
function setLang(lang){
  if(lang==="es"){
    document.getElementById("title").innerText="Ventanas y soluciones";
    document.getElementById("subtitle").innerText="PVC, persianas y mosquiteras";
    document.getElementById("calcTitle").innerText="Calcular precio";
  } else {
    document.getElementById("title").innerText="Окна и решения";
    document.getElementById("subtitle").innerText="ПВХ, жалюзи, москитки";
    document.getElementById("calcTitle").innerText="Рассчитать стоимость";
  }
}
</script>

</body>
</html>
